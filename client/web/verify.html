<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SENTINEL Verify</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f8fb;
        --panel: #ffffff;
        --ink: #17202a;
        --muted: #5c6b7a;
        --line: #d9e1ea;
        --accent: #0f766e;
        --accent-strong: #115e59;
        --bad: #991b1b;
        --good: #166534;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.5;
      }

      header {
        border-bottom: 1px solid var(--line);
        background: #ffffff;
      }

      .bar,
      main {
        width: min(1120px, calc(100% - 32px));
        margin: 0 auto;
      }

      .bar {
        min-height: 64px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .brand {
        font-size: 1.1rem;
        font-weight: 750;
      }

      nav {
        display: flex;
        gap: 8px;
      }

      nav a {
        color: var(--muted);
        text-decoration: none;
        padding: 8px 10px;
        border-radius: 6px;
      }

      nav a[aria-current="page"],
      nav a:hover {
        background: #edf7f6;
        color: var(--accent-strong);
      }

      main {
        display: grid;
        gap: 20px;
        padding: 28px 0 40px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 20px;
      }

      h1,
      h2 {
        margin: 0;
        letter-spacing: 0;
      }

      h1 {
        font-size: clamp(1.6rem, 2.5vw, 2.2rem);
        line-height: 1.15;
      }

      h2 {
        font-size: 1rem;
        margin-bottom: 14px;
      }

      .subhead {
        margin: 8px 0 22px;
        color: var(--muted);
      }

      form {
        display: grid;
        gap: 14px;
      }

      label {
        display: grid;
        gap: 6px;
        font-weight: 650;
      }

      input {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 10px 12px;
        color: var(--ink);
        background: #ffffff;
        font: inherit;
        font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
      }

      input:focus {
        outline: 3px solid #b9e6e0;
        border-color: var(--accent);
      }

      button {
        border: 0;
        border-radius: 6px;
        background: var(--accent);
        color: #ffffff;
        cursor: pointer;
        font: inherit;
        font-weight: 700;
        min-height: 42px;
        padding: 10px 14px;
        width: fit-content;
      }

      button:hover {
        background: var(--accent-strong);
      }

      .status {
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 12px;
        font-weight: 750;
      }

      .status.valid {
        border-color: #bbf7d0;
        color: var(--good);
        background: #f0fdf4;
      }

      .status.bad {
        border-color: #fecaca;
        color: var(--bad);
        background: #fef2f2;
      }

      dl {
        display: grid;
        grid-template-columns: 150px minmax(0, 1fr);
        gap: 8px 12px;
        margin: 14px 0 0;
      }

      dt {
        color: var(--muted);
      }

      dd {
        margin: 0;
        overflow-wrap: anywhere;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        border-bottom: 1px solid var(--line);
        padding: 10px;
        text-align: left;
        vertical-align: top;
      }

      td:last-child {
        overflow-wrap: anywhere;
        font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
        font-size: 0.9rem;
      }

      @media (max-width: 720px) {
        .bar {
          align-items: flex-start;
          flex-direction: column;
          padding: 14px 0;
        }

        dl {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="bar">
        <div class="brand">SENTINEL</div>
        <nav aria-label="Primary">
          <a href="/">Submit</a>
          <a href="/verify" aria-current="page">Verify</a>
          <a href="/admin">Admin</a>
        </nav>
      </div>
    </header>

    <main>
      <section class="panel" aria-labelledby="verify-title">
        <h1 id="verify-title">Receipt verification</h1>
        <p class="subhead">Check the HMAC seal and Merkle proof for a stored report.</p>
        <form id="verify-form">
          <label>
            Report ID
            <input id="report-id" maxlength="64" minlength="64" autocomplete="off" required>
          </label>
          <button type="submit">Verify</button>
        </form>
      </section>

      <section class="panel" aria-labelledby="result-title">
        <h2 id="result-title">Result</h2>
        <div id="status" class="status">Awaiting receipt.</div>
        <dl>
          <dt>Current root</dt>
          <dd id="current-root">-</dd>
          <dt>Report root</dt>
          <dd id="report-root">-</dd>
          <dt>Leaf hash</dt>
          <dd id="leaf-hash">-</dd>
          <dt>Route</dt>
          <dd id="route-path">-</dd>
        </dl>
      </section>

      <section class="panel" aria-labelledby="proof-title">
        <h2 id="proof-title">Merkle proof</h2>
        <table>
          <thead>
            <tr>
              <th>Side</th>
              <th>Sibling hash</th>
            </tr>
          </thead>
          <tbody id="proof-body">
            <tr><td colspan="2">-</td></tr>
          </tbody>
        </table>
      </section>
    </main>

    <script>
      const form = document.querySelector("#verify-form");
      const statusEl = document.querySelector("#status");
      const currentRootEl = document.querySelector("#current-root");
      const reportRootEl = document.querySelector("#report-root");
      const leafHashEl = document.querySelector("#leaf-hash");
      const routePathEl = document.querySelector("#route-path");
      const proofBody = document.querySelector("#proof-body");

      function setStatus(text, kind = "") {
        statusEl.textContent = text;
        statusEl.className = `status ${kind}`.trim();
      }

      async function refreshRoot() {
        const response = await fetch("/api/v1/audit/merkle-root");
        const data = await response.json();
        currentRootEl.textContent = data.merkle_root;
      }

      function renderProof(proof) {
        proofBody.innerHTML = "";
        if (!proof || proof.length === 0) {
          proofBody.innerHTML = "<tr><td colspan=\"2\">-</td></tr>";
          return;
        }
        for (const step of proof) {
          const row = document.createElement("tr");
          const side = document.createElement("td");
          const hash = document.createElement("td");
          side.textContent = step.position;
          hash.textContent = step.hash;
          row.append(side, hash);
          proofBody.append(row);
        }
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const reportId = document.querySelector("#report-id").value.trim().toLowerCase();
        setStatus("Checking...");
        reportRootEl.textContent = "-";
        leafHashEl.textContent = "-";
        routePathEl.textContent = "-";
        renderProof([]);

        const response = await fetch(`/api/v1/verify/${reportId}`);
        const data = await response.json();
        if (data.status === "VALID") {
          setStatus("VALID", "valid");
        } else {
          setStatus(data.status || "ERROR", "bad");
        }
        reportRootEl.textContent = data.merkle_root || "-";
        leafHashEl.textContent = data.leaf_hash || "-";
        routePathEl.textContent = data.route_path || "-";
        renderProof(data.merkle_proof);
        await refreshRoot();
      });

      refreshRoot().catch(() => {
        currentRootEl.textContent = "Unavailable";
      });
    </script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SENTINEL Submit | BitMaster</title>
    <script src="/crypto.js" defer></script>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f8fb;
        --panel: #ffffff;
        --ink: #17202a;
        --muted: #5c6b7a;
        --line: #d9e1ea;
        --accent: #0f766e;
        --accent-strong: #115e59;
        --warn: #9a3412;
        --good: #166534;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.5;
      }

      header {
        border-bottom: 1px solid var(--line);
        background: #ffffff;
      }

      .bar,
      main {
        width: min(1120px, calc(100% - 32px));
        margin: 0 auto;
      }

      .bar {
        min-height: 64px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .brand {
        font-size: 1.1rem;
        font-weight: 750;
        letter-spacing: 0;
      }

      nav {
        display: flex;
        gap: 8px;
      }

      nav a {
        color: var(--muted);
        text-decoration: none;
        padding: 8px 10px;
        border-radius: 6px;
      }

      nav a[aria-current="page"],
      nav a:hover {
        background: #edf7f6;
        color: var(--accent-strong);
      }

      main {
        display: grid;
        grid-template-columns: minmax(0, 1.4fr) minmax(300px, 0.8fr);
        gap: 20px;
        padding: 28px 0 40px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 20px;
      }

      h1,
      h2 {
        margin: 0;
        letter-spacing: 0;
      }

      h1 {
        font-size: clamp(1.6rem, 2.5vw, 2.2rem);
        line-height: 1.15;
      }

      h2 {
        font-size: 1rem;
        margin-bottom: 14px;
      }

      .subhead {
        margin: 8px 0 22px;
        color: var(--muted);
      }

      form {
        display: grid;
        gap: 14px;
      }

      label {
        display: grid;
        gap: 6px;
        font-weight: 650;
      }

      .hint {
        color: var(--muted);
        font-size: 0.9rem;
        font-weight: 450;
      }

      input,
      textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 10px 12px;
        color: var(--ink);
        background: #ffffff;
        font: inherit;
      }

      textarea {
        min-height: 220px;
        resize: vertical;
      }

      input:focus,
      textarea:focus {
        outline: 3px solid #b9e6e0;
        border-color: var(--accent);
      }

      .actions {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      button {
        border: 0;
        border-radius: 6px;
        background: var(--accent);
        color: #ffffff;
        cursor: pointer;
        font: inherit;
        font-weight: 700;
        min-height: 42px;
        padding: 10px 14px;
      }

      button:hover {
        background: var(--accent-strong);
      }

      button:disabled {
        cursor: wait;
        opacity: 0.7;
      }

      .secondary {
        background: #e8eef5;
        color: var(--ink);
      }

      .secondary:hover {
        background: #d9e3ee;
      }

      .receipt {
        overflow-wrap: anywhere;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #f8fafc;
        padding: 12px;
        min-height: 72px;
        font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
        font-size: 0.95rem;
      }

      .status {
        min-height: 24px;
        color: var(--muted);
      }

      .status.error {
        color: var(--warn);
      }

      .status.ok {
        color: var(--good);
      }

      dl {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr);
        gap: 8px 12px;
        margin: 0;
      }

      dt {
        color: var(--muted);
      }

      dd {
        margin: 0;
        overflow-wrap: anywhere;
      }

      @media (max-width: 820px) {
        main {
          grid-template-columns: 1fr;
        }

        .bar {
          align-items: flex-start;
          flex-direction: column;
          padding: 14px 0;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="bar">
        <div class="brand">BitMaster</div>
        <nav aria-label="Primary">
          <a href="/" aria-current="page">Submit</a>
          <a href="/verify">Verify</a>
          <a href="/admin">Admin</a>
        </nav>
      </div>
    </header>

    <main>
      <section class="panel" aria-labelledby="submit-title">
        <h1 id="submit-title">Encrypted report submission</h1>
        <p class="subhead">Submit once. Prove forever. Stay anonymous always.</p>

        <form id="report-form">
          <label>
            Title
            <input id="title" name="title" maxlength="120" autocomplete="off">
            <span class="hint">Optional</span>
          </label>

          <label>
            Report body
            <textarea id="body" name="body" required autocomplete="off"></textarea>
          </label>

          <label>
            Attachment
            <input id="attachment" name="attachment" type="file">
            <span class="hint">Optional, 10 MB maximum</span>
          </label>

          <div class="actions">
            <button id="submit-button" type="submit">Encrypt and submit</button>
            <span id="form-status" class="status" role="status"></span>
          </div>
        </form>
      </section>

      <aside class="panel" aria-labelledby="receipt-title">
        <h2 id="receipt-title">Receipt</h2>
        <div id="receipt" class="receipt">No report submitted yet.</div>
        <div class="actions" style="margin-top: 12px;">
          <button id="copy-button" class="secondary" type="button" disabled>Copy receipt</button>
        </div>
        <hr style="border: 0; border-top: 1px solid var(--line); margin: 18px 0;">
        <dl>
          <dt>Merkle root</dt>
          <dd id="merkle-root">-</dd>
          <dt>Route</dt>
          <dd id="route-path">-</dd>
        </dl>
      </aside>
    </main>

    <script>
      const MAX_FILE_BYTES = 10 * 1024 * 1024;
      const form = document.querySelector("#report-form");
      const statusEl = document.querySelector("#form-status");
      const receiptEl = document.querySelector("#receipt");
      const copyButton = document.querySelector("#copy-button");
      const submitButton = document.querySelector("#submit-button");
      const merkleRootEl = document.querySelector("#merkle-root");
      const routePathEl = document.querySelector("#route-path");
      let currentReceipt = "";

      function setStatus(message, type = "") {
        statusEl.textContent = message;
        statusEl.className = `status ${type}`.trim();
      }

      async function buildPayload() {
        const file = document.querySelector("#attachment").files[0];
        let attachment = null;
        if (file) {
          if (file.size > MAX_FILE_BYTES) {
            throw new Error("Attachment exceeds 10 MB");
          }
          const buffer = await file.arrayBuffer();
          attachment = {
            name: file.name,
            type: file.type || "application/octet-stream",
            size: file.size,
            sha256: await SentinelCrypto.sha256Hex(buffer),
            data_base64: SentinelCrypto.bytesToBase64(new Uint8Array(buffer)),
          };
        }

        return {
          title: document.querySelector("#title").value.trim(),
          body: document.querySelector("#body").value,
          attachment,
          client: "web-interface",
        };
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        setStatus("Encrypting...");
        submitButton.disabled = true;

        try {
          const keyResponse = await fetch("/api/v1/public-key");
          if (!keyResponse.ok) {
            throw new Error("Could not load public key");
          }
          const { public_key_pem: publicKeyPem } = await keyResponse.json();
          const payload = await buildPayload();
          const encrypted = await SentinelCrypto.encryptPayload(payload, publicKeyPem);

          setStatus("Submitting...");
          const response = await fetch("/api/v1/submit", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(encrypted),
          });
          const result = await response.json();
          if (!response.ok) {
            throw new Error(result.error || "Submission failed");
          }

          currentReceipt = result.report_id;
          receiptEl.textContent = currentReceipt;
          merkleRootEl.textContent = result.merkle_root;
          routePathEl.textContent = result.route.path.join(" -> ");
          copyButton.disabled = false;
          setStatus("Stored", "ok");
          form.reset();
        } catch (error) {
          setStatus(error.message, "error");
        } finally {
          submitButton.disabled = false;
        }
      });

      copyButton.addEventListener("click", async () => {
        if (!currentReceipt) return;
        await navigator.clipboard.writeText(currentReceipt);
        setStatus("Receipt copied", "ok");
      });
    </script>
  </body>
</html>

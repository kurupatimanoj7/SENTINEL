substitutions:
  _REGION: asia-south1
  _SERVICE_NAME: sentinel-bitmaster

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/sentinel/${_SERVICE_NAME}:$COMMIT_SHA
      - .
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/sentinel/${_SERVICE_NAME}:$COMMIT_SHA
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/sentinel/${_SERVICE_NAME}:$COMMIT_SHA
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --allow-unauthenticated
      - --set-env-vars
      - SENTINEL_HOST=0.0.0.0

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/sentinel/${_SERVICE_NAME}:$COMMIT_SHA

